<svg width="1360" height="480" viewBox="0 0 1360 480" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="ProjectX — Discord Bot Dashboard">
  <defs>
    <linearGradient id="bg-base" x1="0" y1="0" x2="1360" y2="480" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0E1118"/>
      <stop offset="1" stop-color="#0A0C11"/>
    </linearGradient>
    <radialGradient id="glow-blurple" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(150 30) rotate(50) scale(560)">
      <stop stop-color="#5865F2" stop-opacity="0.40"/>
      <stop offset="1" stop-color="#5865F2" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow-cyan" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1230 470) rotate(-130) scale(560)">
      <stop stop-color="#22D3EE" stop-opacity="0.34"/>
      <stop offset="1" stop-color="#22D3EE" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow-violet" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(760 240) rotate(0) scale(520 360)">
      <stop stop-color="#A78BFA" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#A78BFA" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="tile-brand" x1="100" y1="148" x2="300" y2="332" gradientUnits="userSpaceOnUse">
      <stop stop-color="#5865F2"/>
      <stop offset="0.55" stop-color="#A78BFA"/>
      <stop offset="1" stop-color="#22D3EE"/>
    </linearGradient>
    <radialGradient id="tile-gloss" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(135 175) rotate(55) scale(170)">
      <stop stop-color="#FFFFFF" stop-opacity="0.38"/>
      <stop offset="0.6" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="node-cyan" x1="232" y1="178" x2="270" y2="216" gradientUnits="userSpaceOnUse">
      <stop stop-color="#EAFCFF"/>
      <stop offset="1" stop-color="#22D3EE"/>
    </linearGradient>
    <linearGradient id="wm-x" x1="980" y1="150" x2="1240" y2="330" gradientUnits="userSpaceOnUse">
      <stop stop-color="#A78BFA"/>
      <stop offset="1" stop-color="#22D3EE"/>
    </linearGradient>
    <linearGradient id="text-x" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#A78BFA"/>
      <stop offset="1" stop-color="#22D3EE"/>
    </linearGradient>
    <filter id="tile-shadow" x="60" y="120" width="280" height="280" filterUnits="userSpaceOnUse">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#000000" flood-opacity="0.45"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1360" height="480" fill="url(#bg-base)"/>
  <rect width="1360" height="480" fill="url(#glow-blurple)"/>
  <rect width="1360" height="480" fill="url(#glow-cyan)"/>
  <rect width="1360" height="480" fill="url(#glow-violet)"/>

  <!-- Decorative oversized X watermark (right) -->
  <g stroke="url(#wm-x)" stroke-width="64" stroke-linecap="round" opacity="0.12">
    <path d="M1010 150 L1230 330"/>
    <path d="M1230 150 L1010 330"/>
  </g>
  <!-- Network nodes motif -->
  <g opacity="0.5">
    <line x1="1230" y1="150" x2="1300" y2="96" stroke="#22D3EE" stroke-opacity="0.35" stroke-width="2"/>
    <line x1="1010" y1="330" x2="956" y2="392" stroke="#A78BFA" stroke-opacity="0.30" stroke-width="2"/>
    <circle cx="1300" cy="96" r="6" fill="#22D3EE"/>
    <circle cx="956" cy="392" r="5" fill="#A78BFA"/>
  </g>

  <!-- Logo tile -->
  <g filter="url(#tile-shadow)">
    <rect x="100" y="148" width="200" height="200" rx="52" fill="url(#tile-brand)"/>
  </g>
  <rect x="100" y="148" width="200" height="200" rx="52" fill="url(#tile-gloss)"/>
  <rect x="100.6" y="148.6" width="198.8" height="198.8" rx="51.4" stroke="#FFFFFF" stroke-opacity="0.16" stroke-width="1.2"/>
  <g stroke="#FFFFFF" stroke-width="23" stroke-linecap="round">
    <path d="M148 196 L252 300"/>
    <path d="M252 196 L148 300"/>
  </g>
  <circle cx="252" cy="196" r="19" fill="url(#node-cyan)"/>
  <circle cx="252" cy="196" r="19" stroke="#FFFFFF" stroke-opacity="0.55" stroke-width="1.5"/>
  <circle cx="246.5" cy="190.5" r="3.6" fill="#FFFFFF" opacity="0.9"/>

  <!-- Wordmark + tagline -->
  <text x="350" y="256" font-family="'Space Grotesk','Segoe UI',Arial,sans-serif" font-size="96" font-weight="700" letter-spacing="-3">
    <tspan fill="#EDEEF4">Project</tspan><tspan fill="url(#text-x)">X</tspan>
  </text>
  <text x="354" y="312" font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="28" font-weight="500" letter-spacing="0.3" fill="#9aa3b6">A modern dashboard for your Discord bot</text>

  <!-- Feature chips -->
  <g font-family="'Inter','Segoe UI',Arial,sans-serif" font-size="20" font-weight="600">
    <g>
      <rect x="354" y="344" width="138" height="40" rx="20" fill="#FFFFFF" fill-opacity="0.05" stroke="#FFFFFF" stroke-opacity="0.12"/>
      <text x="423" y="370" fill="#c7cdda" text-anchor="middle">Moderation</text>
    </g>
    <g>
      <rect x="504" y="344" width="116" height="40" rx="20" fill="#FFFFFF" fill-opacity="0.05" stroke="#FFFFFF" stroke-opacity="0.12"/>
      <text x="562" y="370" fill="#c7cdda" text-anchor="middle">Leveling</text>
    </g>
    <g>
      <rect x="632" y="344" width="106" height="40" rx="20" fill="#FFFFFF" fill-opacity="0.05" stroke="#FFFFFF" stroke-opacity="0.12"/>
      <text x="685" y="370" fill="#c7cdda" text-anchor="middle">Tickets</text>
    </g>
    <g>
      <rect x="750" y="344" width="160" height="40" rx="20" fill="#FFFFFF" fill-opacity="0.05" stroke="#FFFFFF" stroke-opacity="0.12"/>
      <text x="830" y="370" fill="#c7cdda" text-anchor="middle">21 modules</text>
    </g>
  </g>
</svg>
