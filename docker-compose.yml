version: "3.8"

# ProjectX — deploy as a Portainer Stack.
# Set the variables below in Portainer (Stack → Environment variables) or in a
# .env next to this file. Secrets MUST be provided; optional ones can stay empty.
#
# Required:  DISCORD_CLIENT_ID DISCORD_CLIENT_SECRET DISCORD_TOKEN
#            DISCORD_REDIRECT_URI FRONTEND_URL SESSION_SECRET BOT_API_KEY OWNER_DISCORD_ID
# Optional:  APPLICATION_ID SKU_BASIC_ID SKU_PRO_ID
#            YOUTUBE_API_KEY TWITCH_CLIENT_ID TWITCH_CLIENT_SECRET KICK_CLIENT_ID KICK_CLIENT_SECRET
#
# TLS/Domain via Nginx Proxy Manager: the `frontend` joins the external `proxy`
# network and is NOT published on a host port — NPM forwards to `frontend:80`.
# Create the network once (Portainer → Networks → Add → name "proxy", bridge),
# then deploy nginx-proxy-manager.yml. To run WITHOUT NPM instead, drop the
# `proxy` network from `frontend`, add a `ports: ["8080:80"]` and remove the
# top-level `networks:` block.

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: "3000"
      DATABASE_URL: ${DATABASE_URL:-/data/bot.db}
      DISCORD_CLIENT_ID: ${DISCORD_CLIENT_ID}
      DISCORD_CLIENT_SECRET: ${DISCORD_CLIENT_SECRET}
      DISCORD_REDIRECT_URI: ${DISCORD_REDIRECT_URI}
      FRONTEND_URL: ${FRONTEND_URL}
      SESSION_SECRET: ${SESSION_SECRET}
      BOT_API_KEY: ${BOT_API_KEY}
      OWNER_DISCORD_ID: ${OWNER_DISCORD_ID}
    volumes:
      - projectx-data:/data
    healthcheck:
      # 127.0.0.1 (not localhost) to avoid IPv6 ::1 resolution while the server
      # binds IPv4 0.0.0.0; http module is more robust than fetch here.
      test: ["CMD", "node", "-e", "require('http').get('http://127.0.0.1:3000/api/health',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 40s

  bot:
    build:
      context: .
      dockerfile: Dockerfile.bot
    restart: unless-stopped
    environment:
      DISCORD_TOKEN: ${DISCORD_TOKEN}
      DISCORD_CLIENT_ID: ${DISCORD_CLIENT_ID}
      DISCORD_CLIENT_SECRET: ${DISCORD_CLIENT_SECRET}
      BACKEND_URL: ${BACKEND_URL:-http://backend:3000}
      BOT_API_KEY: ${BOT_API_KEY}
      # Premium / SKU monetization (optional — cog stays inert if empty)
      APPLICATION_ID: ${APPLICATION_ID:-}
      SKU_BASIC_ID: ${SKU_BASIC_ID:-}
      SKU_PRO_ID: ${SKU_PRO_ID:-}
      PREMIUM_POLL_INTERVAL: ${PREMIUM_POLL_INTERVAL:-300}
      # Social notifications (optional — platforms without creds are skipped)
      YOUTUBE_API_KEY: ${YOUTUBE_API_KEY:-}
      TWITCH_CLIENT_ID: ${TWITCH_CLIENT_ID:-}
      TWITCH_CLIENT_SECRET: ${TWITCH_CLIENT_SECRET:-}
      KICK_CLIENT_ID: ${KICK_CLIENT_ID:-}
      KICK_CLIENT_SECRET: ${KICK_CLIENT_SECRET:-}
      SOCIAL_POLL_INTERVAL: ${SOCIAL_POLL_INTERVAL:-180}
    depends_on:
      - backend

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        # VITE_* are baked in at build time. /api keeps the dashboard same-origin
        # with the API (nginx proxies /api → backend) — no CORS, cookies just work.
        VITE_BACKEND_URL: ${VITE_BACKEND_URL:-/api}
        VITE_DISCORD_CLIENT_ID: ${DISCORD_CLIENT_ID}
        VITE_DISCORD_REDIRECT_URI: ${DISCORD_REDIRECT_URI}
    restart: unless-stopped
    expose:
      - "80"
    networks:
      - default
      - proxy
    depends_on:
      - backend

volumes:
  projectx-data:

networks:
  # Shared with Nginx Proxy Manager so it can reach `frontend` by name.
  proxy:
    external: true
