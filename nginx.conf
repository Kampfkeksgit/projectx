server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Don't cache the SPA shell; do cache fingerprinted assets.
    location /assets/ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA fallback — every non-file route serves index.html (Vue Router).
    location / {
        try_files $uri $uri/ /index.html;
    }

    # API reverse proxy — keeps the dashboard same-origin with the backend, so
    # session cookies work without CORS. 'backend' is the compose service name.
    location /api/ {
        # Resolve 'backend' at REQUEST time via Docker's embedded DNS (127.0.0.11)
        # so nginx still boots when the backend is briefly down — it returns 502
        # instead of crashing with "host not found in upstream".
        resolver 127.0.0.11 valid=30s ipv6=off;
        set $px_backend backend;
        proxy_pass http://$px_backend:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 60s;
    }
}
